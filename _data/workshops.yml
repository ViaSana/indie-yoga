- name: Free Vinyasa Class & YTT Info Session
  description: >-
    Want to go deeper into your practice? Join Sara and Liv for a 90-minute
    co-taught Vinyasa class.


    We’ll begin with intention setting, then move through a dynamic flow
    featuring two dedicated mini workshops — a Chaturanga breakdown and a peak
    posture — with alignment guidance and hands-on support.


    We’ll close the class with Yoga Nidra into Savasana. After, stay for a brief
    info session on Indie’s upcoming 200 hour Yoga Teacher Training, Sept.
    15–Dec. 13. Bring your questions and get a feel for how teacher training can
    deepen your practice and prepare you to teach.
  datetime: 2026-05-17 14:30:00 -0700
  image: /assets/uploads/copy-of-200-hour-ytt-carousel-1.png
  price: Free
  walla_link: https://api.hellowalla.com/previews/123651?b=34&type=enrollment
