- name: 'Fire & Form: A 26 & 2 Posture Clinic'
  description: >-
    Join this focused Hot Series (26 & 2) posture clinic designed to break down
    each posture with precision, alignment and mindful awareness within the
    heat. Through expert guidance from Paul, Jenna and Jessa, you’ll refine
    technique, build strength and enhance flexibility and control, while
    learning to reduce the risk of injury. Whether you’re new to the series or
    are ready to elevate your practice, you’ll gain practical tools,
    personalized feedback and a clearer connection between breath, body and
    discipline — so you can move with confidence and purpose, in and out of the
    hot room.
  datetime: 2026-06-28 12:30:00 -0700
