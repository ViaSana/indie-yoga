- name: Free Vinyasa Class & YTT Info Session
  description: >-
    Want to go deeper into your practice? Join Sara and Liv for a 90-minute
    co-taught Vinyasa 1 class and Info Session for our upcoming 200 Hour Yoga
    Teacher Training.


    We’ll begin with intention setting, and then move through a dynamic flow
    featuring two dedicated mini workshops — a Chaturanga breakdown and a peak
    posture — with alignment guidance and hands-on support.


    We’ll close the class with Yoga Nidra. After, stay for a brief info session
    on Indie’ 200 Hour YTT, returning Sept. 15-Dec. 13. Bring your questions and
    get a feel for how teacher training can deepen your practice — and where it
    can take you.
  datetime: 2026-05-17 14:30:00 -0700
